# Reverse-proxy devant AFFiNE.
# But : injecter une règle CSS qui masque le bandeau d'avertissement
# "Vos données locales sont enregistrées sur le navigateur et peuvent être perdues..."
# Ce bandeau s'affiche dans tout workspace LOCAL (y compris ceux déjà créés dans
# le navigateur), indépendamment de la config serveur — on le masque donc côté HTML.
# Le sélecteur data-testid="local-demo-tips" est l'élément conteneur du bandeau (AFFiNE 0.26.x).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Pas de limite de taille (AFFiNE gère des blobs/uploads volumineux)
    client_max_body_size 0;

    location / {
        proxy_pass http://web:3010;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support WebSocket (synchronisation temps réel AFFiNE)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Désactive la compression amont pour que sub_filter puisse réécrire le HTML
        proxy_set_header Accept-Encoding "";

        # Injection du correctif : masque le bandeau de données locales
        sub_filter '</head>' '<style>[data-testid="local-demo-tips"]{display:none!important}</style></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
