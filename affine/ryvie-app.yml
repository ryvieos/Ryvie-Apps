manifestVersion: 1
id: affine
name: Affine
category:
  fr: Productivité
  en: Productivity
version: 0.26.3
buildId: 20
port: 3015
description:
  fr: "AFFiNE est une application open-source moderne de prise de notes et de gestion des connaissances, conçue pour remplacer les outils traditionnels de productivité. Elle combine documents, tableaux, blocs de texte et organisation visuelle dans un espace de travail unique, flexible et intuitif.\nPensée pour les individus comme pour les équipes, AFFiNE permet de structurer, relier et faire évoluer vos idées librement, en ligne ou hors ligne. Vos données restent sous votre contrôle grâce à une approche open-source et respectueuse de la vie privée.\nFonctionnalités clés :\n- Prise de notes par blocs (texte, listes, tableaux, etc.)\n- Organisation visuelle et liens entre contenus\n- Travail hors ligne avec synchronisation\n- Collaboration en temps réel\n- Données locales et contrôle total de la confidentialité\n- Projet open-source, transparent et extensible\nAFFiNE est l’outil idéal pour la prise de notes, la gestion de projets, la recherche ou le brainstorming."
  en: "AFFiNE is a modern open-source note-taking and knowledge management application designed to replace traditional productivity tools. It brings together documents, tables, text blocks, and visual organization into a single, flexible, and intuitive workspace.\nBuilt for both individuals and teams, AFFiNE lets you structure, connect, and grow your ideas freely, online or offline. Your data stays under your control thanks to its open-source, privacy-first approach.\nKey features:\n- Block-based note taking (text, lists, tables, and more)\n- Visual organization and linked content\n- Offline-first with synchronization\n- Real-time collaboration\n- Local data storage and full privacy control\n- Open-source, transparent, and extensible\nAFFiNE is perfect for note-taking, project management, research, and brainstorming."
tagline:
  fr: "L'outil parfait pour la prise de notes, la gestion de projets, la recherche et le brainstorming."
  en: "The perfect tool for note-taking, project management, research, and brainstorming."
gallery:
  - icon.png
  - image1.png
  - image2.png
  - image3.png
architectures:
  - amd64
  - arm64
# Point central IA Ryvie (Copilot AFFiNE) : clé + base LiteLLM injectées à la
# connexion. Note : Copilot doit aussi être activé dans l'espace de travail AFFiNE.
ai:
  set:
    apiKey: COPILOT_OPENAI_API_KEY
    baseUrl: COPILOT_OPENAI_BASE_URL
  restart: true
accounts:
  # La logique de reset vit DANS l'app : la fiche ryvie-accounts.cjs s'exécute dans
  # app-affine-web et réutilise le client Prisma d'AFFiNE (accès DB) + sa lib
  # @node-rs/argon2 (hash argon2id sans secret). Le core ne connaît plus le schéma.
  strategy: container-exec
  container: app-affine-web
  runtime: node
  script: /ryvie/ryvie-accounts.cjs
  workingDir: /app
  reset:
    expect: "OK"
  # Compte par défaut créé par install.sh (create-admin-user)
  default:
    email: changeme@ryvie.fr
    username: changeme
    password: "Changeme1234!"
    provision: installScript
