version: '3.9'
 
services:
  # Reverse-proxy nginx : expose AFFiNE et injecte le CSS qui masque
  # le bandeau "données locales" (voir nginx.conf).
  proxy:
    image: nginx:alpine
    container_name: app-affine-proxy
    restart: unless-stopped
    ports:
      - "3015:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - affine-network

  web:
    image: ghcr.io/toeverything/affine:0.26.3
    container_name: app-affine-web
    restart: unless-stopped
    expose:
      - "3010"
    environment:
      REDIS_SERVER_HOST: redis
      DATABASE_URL: postgres://affine:affine@db:5432/affine
      NODE_ENV: production
      # URL externe réelle (écrite dans .env par install.sh avec l'IP NetBird).
      # Indispensable : sinon AFFiNE bloque en CORS les requêtes du navigateur
      # et la synchro des workspaces cloud échoue.
      AFFINE_SERVER_EXTERNAL_URL: ${AFFINE_SERVER_EXTERNAL_URL:-}
      # IA centrale Ryvie (Copilot) — injecté quand l'app est connectée (Réglages → IA).
      # Vides par défaut : Copilot reste inactif tant qu'aucune clé n'est posée.
      COPILOT_OPENAI_API_KEY: ${COPILOT_OPENAI_API_KEY:-}
      COPILOT_OPENAI_BASE_URL: ${COPILOT_OPENAI_BASE_URL:-}
    volumes:
      - ./data/config:/root/.affine/config
      - ./data/storage/blob:/root/.affine/storage
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    networks:
      - affine-network

  migration:
    image: ghcr.io/toeverything/affine:0.26.3
    container_name: app-affine-migration
    restart: "no"
    command: ["sh", "-c", "node ./scripts/self-host-predeploy"]
    environment:
      REDIS_SERVER_HOST: redis
      DATABASE_URL: postgres://affine:affine@db:5432/affine
      NODE_ENV: production
    volumes:
      - ./data/config:/root/.affine/config
      - ./data/storage/blob:/root/.affine/storage
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy 
    networks:
      - affine-network

  redis:
    image: redis:7.2.4
    container_name: app-affine-redis
    restart: unless-stopped
    volumes:
      - ./data/storage/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - affine-network

  db:
    image: postgres:16.2
    container_name: app-affine-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: affine
      POSTGRES_PASSWORD: affine
      POSTGRES_DB: affine
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/storage/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U affine"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - affine-network

networks:
  affine-network:
  