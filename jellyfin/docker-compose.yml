services:
  jellyfin:
    image: jellyfin/jellyfin:10.11.8@sha256:1ebca12ee68116ddc6bd38ea01af2db50d6e4cee64a5076981ef75c35709d5e8
    container_name: app-jellyfin
    ports:
      - 8096:8096
    volumes:
      - ./data/config:/config
      - ./data/cache:/cache
      - type: bind 
        source: ./data/media
        target: /media
      - type: bind
        source: ./data/media2
        target: /media2
        read_only: true
      - type: bind
        source: ./data/fonts
        target: /usr/local/share/fonts/custom
        read_only: true
    restart: 'unless-stopped'