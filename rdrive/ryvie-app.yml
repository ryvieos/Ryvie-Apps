description:
  fr: "rDrive est une solution de stockage de fichiers auto-hébergée, sécurisée et facile à utiliser.\nGérez, partagez et synchronisez vos fichiers en toute simplicité. Que ce soit pour un usage personnel ou professionnel, rDrive vous offre un espace de stockage fiable et accessible.\nCe que vous pouvez faire avec rDrive :\n- Stocker et organiser vos fichiers\n- Synchroniser vos données sur votre ryvie\n- Accéder à vos fichiers depuis n'importe où\nrDrive est conçu pour être simple, sécurisé et performant — vos données restent sous votre contrôle."
  en: "rDrive is a self-hosted, secure, and easy-to-use file storage solution.\nManage, share, and sync your files with ease. Whether for personal or professional use, rDrive provides you with a reliable and accessible storage space.\nWhat you can do with rDrive:\n- Store and organize your files\n- Sync your data on your ryvie\n- Access your files from anywhere\nrDrive is designed to be simple, secure, and efficient — your data remains under your control."
tagline:
  fr: "Votre solution de stockage de fichiers auto-hébergée, sécurisée et facile à utiliser."
  en: "Your self-hosted, secure, and easy-to-use file storage solution."
gallery:
  - icon.svg
  - image1.png
  - image2.png
# Bloc `ai` : connecte la partie OnlyOffice au gateway IA central (LiteLLM piloté
# par Ryvie). OnlyOffice ne lit pas l'IA depuis un .env : sa config IA vit côté
# Document Server (clé `aiSettings` de local.json). Les hooks ci-dessous écrivent
# cette config et relancent le service. `restart: false` → Ryvie ne fait PAS de
# `docker compose up` sur toute la stack rDrive ; le hook redémarre juste le
# service docservice du Document Server (ciblé, sans couper les autres conteneurs).
ai:
  restart: false
  # Le conteneur Document Server est rattaché au réseau IA dédié (ryvie-ai) → il joint
  # LiteLLM par DNS (ryvie-litellm), indépendant de l'IP hôte, sans accès à l'infra
  # sensible de ryvie-network. Rattachement géré par aiService (plus besoin de le faire
  # dans le hook).
  containers:
    - app-rdrive-onlyoffice
  hooks:
    connect: ai/connect.sh
    disconnect: ai/disconnect.sh
