version: "3.8"

services:
  # ==========================================
  # OnlyOffice Stack
  # ==========================================
  onlyoffice-rabbitmq:
    image: julescloud/rdrive-rabbitmq:v0.0.0@sha256:4d7c7d4796fc154f50f2eae1b6ae7f7bd19f7e4aa2865ead26c0fb707dc081bc
    container_name: app-rdrive-rabbitmq
    hostname: onlyoffice-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./docker-data/rabbitmq/data:/var/lib/rabbitmq
      - ./docker-data/rabbitmq/log:/var/log/rabbitmq
    networks:
      - tdrive_network
      - tdrive_default
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  onlyoffice-postgresql:
    image: julescloud/rdrive-postgresql:v0.0.0@sha256:17520d7a95d7693469605ee28162f957ac26ba2d29a4d9331d01b2655aa5b0ac
    container_name: app-rdrive-postgresql
    hostname: onlyoffice-postgresql
    environment:
      - POSTGRES_DB=onlyoffice
      - POSTGRES_USER=onlyoffice
      - POSTGRES_PASSWORD=onlyoffice
    ports:
      - "5433:5432"
    volumes:
      - ./docker-data/onlyoffice-postgres:/var/lib/postgresql/data
    networks:
      - tdrive_network
      - tdrive_default
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U onlyoffice" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  onlyoffice:
    image: julescloud/rdrive-onlyoffice:v0.0.0@sha256:85bbb3e375041cd8a9b4d9fe5b7d1a31ec34d1b50fd00be55dd4e15af9f388c6
    container_name: app-rdrive-onlyoffice
    hostname: onlyoffice
    ports:
      - "8090:80"
    environment:
      - AMQP_URI=amqp://guest:guest@onlyoffice-rabbitmq
      - DB_HOST=onlyoffice-postgresql
      - DB_NAME=onlyoffice
      - DB_PORT=5432
      - DB_TYPE=postgres
      - DB_USER=onlyoffice
      - JWT_ENABLED=false
      - ALLOW_META_IP_ADDRESS=true
      - ALLOW_PRIVATE_IP_ADDRESS=true
    depends_on:
      onlyoffice-rabbitmq:
        condition: service_healthy
      onlyoffice-postgresql:
        condition: service_healthy
    volumes:
      - ./docker-data/onlyoffice/Data:/var/www/onlyoffice/Data
      - ./docker-data/onlyoffice/lib:/var/lib/onlyoffice
      - ./docker-data/onlyoffice/log:/var/log/onlyoffice
    networks:
      - tdrive_network
      - tdrive_default
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/healthcheck" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  onlyoffice-connector:
    container_name: app-rdrive-onlyoffice-connector
    image: julescloud/rdrive-onlyoffice-connector:v0.1.0@sha256:6efcd65d13cdd7abea5209a6200ce6538ce84ea45980f392dc79a7b624be8c46
    environment:
      - SERVER_PORT=5000
      - SERVER_PREFIX=/plugins/onlyoffice/
      - SERVER_ORIGIN=${REACT_APP_ONLYOFFICE_CONNECTOR_URL}
      - CREDENTIALS_ENDPOINT=http://localhost:4000/
      - ONLY_OFFICE_SERVER=http://localhost:8090/
      - CREDENTIALS_ID=tdrive_onlyoffice
      - CREDENTIALS_SECRET=c1cc66db78e1d3bb4713c55d5ab2
    network_mode: host
    restart: unless-stopped
    depends_on:
      onlyoffice:
        condition: service_healthy

  # ==========================================
  # rDrive Core Stack
  # ==========================================
  mongo:
    container_name: app-rdrive-mongo
    restart: unless-stopped
    image: julescloud/rdrive-mongo:v0.0.0@sha256:8338353797de553927861a7ff9e41c5f4beb272415dad65b8e22e2f377180edd
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 2m
      retries: 30
      start_period: 10s
    volumes:
      - ./docker-data/mongo:/data/db
    ports:
      - 27017:27017
    networks:
      - tdrive_default
      - ldap_my_custom_network

  node_create_user:
    container_name: app-rdrive-node-create-user
    image: julescloud/rdrive-node-create-user:v0.1.0@sha256:22df109ada0c45f9c9f12bb657af9b7b0d7528e929ebd5b11cae869547e68492
    env_file:
      - .env
    environment: &backend_env_vars
      - DEV=dev
      - ACCOUNTS_TYPE=internal
      - OAUTH_SERVICE_URL=${OAUTH_SERVICE_URL:-https://cloudoauth-files.ryvie.fr}
      - INSTANCE_ID=${INSTANCE_ID}
      - DB_DRIVER=mongodb
      - DB_MONGO_URI=mongodb://mongo:27017
      - PUBSUB_TYPE=local
      - SEARCH_DRIVER=mongodb
      - STORAGE_DRIVER=local
      - STORAGE_LOCAL_PATH=/tdrive/docker-data/files
      - ENABLE_FEATURE_ANTIVIRUS=false
      - DIAG_PROBE_SECRET=diag-secret
      - LDAP_URL=ldap://openldap:1389
      - LDAP_BIND_DN=cn=admin,dc=example,dc=org
      - LDAP_BASE_DN=dc=example,dc=org
      - LDAP_USERS_DN=ou=users,dc=example,dc=org
      - LDAP_GROUPS_DN=ou=groups,dc=example,dc=org
    command: node dist/bin/sync_ldap_users.js
    volumes: &backend_volumes
      - ./docker-data/files:/tdrive/docker-data/files
      - /usr/bin/rclone:/usr/bin/rclone:ro
      - /data/config/rclone:/root/.config/rclone
    depends_on: &backend_dependencies
      mongo:
        condition: service_healthy
      onlyoffice:
        condition: service_healthy
    networks:
      - tdrive_default
      - ldap_my_custom_network

  node:
    container_name: app-rdrive-node
    restart: unless-stopped
    image: julescloud/rdrive-node:v0.1.0@sha256:53b7ef32fb3dcd5279d892a01ff1f6db745f5ec730732ba230bcf013705b3ba7
    env_file:
      - .env
    ports:
      - 4000:4000
      - 9229:9229
    environment: *backend_env_vars
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "ryvie.local:host-gateway"
    healthcheck:
      test: curl --fail 'http://localhost:4000/diagnostics/t/ready?secret=diag-secret'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes: *backend_volumes
    depends_on:
      <<: *backend_dependencies
      node_create_user:
        condition: service_completed_successfully
    networks:
      - tdrive_default
      - ldap_my_custom_network
      - ryvie-network

  frontend:
    image: julescloud/rdrive-frontend:v0.1.0@sha256:26fdb8feb03bbdf4c70003aecde3d80c2f924a08a9273f002e0f3553302900be
    container_name: app-rdrive-frontend
    environment:
      - DEV=production
      - SSL_CERTS=off
      - NODE_HOST=http://node:4000
      - ONLYOFFICE_CONNECTOR_HOST=http://host.docker.internal:5000
      - REACT_APP_FRONTEND_URL=${REACT_APP_FRONTEND_URL}
      - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL}
      - REACT_APP_WEBSOCKET_URL=${REACT_APP_WEBSOCKET_URL}
      - REACT_APP_ONLYOFFICE_CONNECTOR_URL=${REACT_APP_ONLYOFFICE_CONNECTOR_URL}
      - REACT_APP_ONLYOFFICE_DOCUMENT_SERVER_URL=${REACT_APP_ONLYOFFICE_DOCUMENT_SERVER_URL}
      - REACT_APP_FRONTEND_URL_PRIVATE=${REACT_APP_FRONTEND_URL_PRIVATE}
    ports:
      - 3010:80
      - 8443:443
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      node:
        condition: service_healthy
    volumes:
      - ./docker-data/logs/nginx/:/var/log/nginx
      - ./docker-data/letsencrypt/:/etc/letsencrypt/
      - ./docker-data/drive-preview/:/tdrive-core/web/medias/
      - ./docker-data/uploads/:/tdrive-core/web/upload/
      - ./docker-data/ssl:/etc/nginx/ssl
    networks:
      - tdrive_default
      - ldap_my_custom_network

networks:
  tdrive_default:
    name: tdrive_default
  tdrive_network:
    driver: bridge
  ldap_my_custom_network:
    external: true
  ryvie-network:
    external: true