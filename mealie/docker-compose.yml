services:
  mealie:
    container_name: app-mealie
    image: hkotel/mealie:v3.14.0
    volumes:
      - ./mealie-data:/app/data/
      # Fiche de gestion des comptes Ryvie (stratégie container-exec).
      - ./accounts/ryvie-accounts.py:/ryvie/ryvie-accounts.py:ro
    ports:
      - 9091:9000
    environment:
      TZ: Europe/Paris
      # IA centrale Ryvie — injecté quand l'app est connectée (Réglages → IA).
      # Vides par défaut : Mealie n'active ses fonctions IA que si la clé est posée.
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
    restart: unless-stopped
    
volumes:
  mealie-data:
   