manifestVersion: 1
id: mealie
name: Mealie
category:
  fr: Planificateurs
  en: Planners
version: 3.14.0
buildId: 10
port: 9091
description:
  fr: "Mealie simplifie la gestion des recettes et la planification des repas au quotidien.\nEnregistrez vos recettes préférées, planifiez vos menus de la semaine et générez automatiquement vos listes de courses. Que vous cuisiniez souvent ou occasionnellement, Mealie vous aide à gagner du temps et à mieux vous organiser.\nToutes vos recettes sont centralisées, faciles à retrouver et à adapter selon vos envies.\nCe que vous pouvez faire avec Mealie :\n- Enregistrer et organiser vos recettes\n- Planifier les repas de la semaine\n- Générer automatiquement des listes de courses\n- Gérer votre collection de recettes\n- Cuisiner plus sereinement au quotidien"
  en: "Mealie simplifies recipe management and meal planning for everyday life.\nSave your favorite recipes, plan your weekly menus, and automatically generate your shopping lists. Whether you cook often or occasionally, Mealie helps you save time and stay organized.\nAll your recipes are centralized, easy to find, and adaptable to your tastes.\nWhat you can do with Mealie:\n- Save and organize your recipes\n- Plan weekly meals\n- Automatically generate shopping lists\n- Manage your recipe collection\n- Cook more confidently every day"
tagline:
  fr: "votre assistant cuisine personnel, pensé pour des repas plus simples et mieux organisés."
  en: "your personal kitchen assistant, designed for simpler and better-organized meals."
gallery:
  - icon.png
  - image1.png
  - image2.png
  - image3.png
accounts:
  # Reset/list/verify délégués à la fiche ryvie-accounts.py (montée dans le conteneur
  # via le compose) : elle réutilise le hasher bcrypt présent dans Mealie. Le core ne
  # connaît plus le schéma. Les champs dbPath/table/columns ci-dessous restent utilisés
  # par le provisioning du compte par défaut (mode sql-update, à l'install).
  strategy: container-exec
  container: app-mealie
  runtime: python3
  script: /ryvie/ryvie-accounts.py
  env:
    DB_PATH: /app/data/mealie.db
  reset:
    expect: "OK"
  # ── Champs conservés pour le provisioning du compte par défaut (sql-update) ──
  dbPath: /app/data/mealie.db
  table: users
  columns:
    id: id
    email: email
    username: username
    password: password
    admin: admin
  # Déverrouille le compte au reset (mealie verrouille après N échecs)
  clearOnReset:
    login_attemps: 0
    locked_at: null
  # mealie embarque un compte changeme@example.com/MyPassword au 1er démarrage.
  # On le transforme en compte uniforme Ryvie (email + mdp) via sql-update.
  default:
    email: changeme@ryvie.fr
    username: changeme
    password: "Changeme1234!"
    provision: sql-update
    shippedEmail: changeme@example.com
# Point central IA Ryvie : variables d'env renseignées quand l'app est connectée
# (Réglages → IA). Ryvie y injecte la base LiteLLM + la master key + le modèle.
ai:
  set:
    apiKey: OPENAI_API_KEY
    baseUrl: OPENAI_BASE_URL
    model: OPENAI_MODEL
  restart: true
