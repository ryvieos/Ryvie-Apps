description:
  fr: "rTransfer est une solution de transfert de fichiers auto-hébergée, sécurisée et facile à utiliser.\nTransférez, partagez et gérez vos fichiers en toute simplicité. Que ce soit pour un usage personnel ou professionnel, rTransfer vous offre une plateforme fiable et accessible.\nCe que vous pouvez faire avec rTransfer :\n- Transférer et organiser vos fichiers\n- Partager des fichiers en toute sécurité\nrTransfer est conçu pour être simple, sécurisé et performant — vos données restent sous votre contrôle."
  en: "rTransfer is a self-hosted, secure, and easy-to-use file transfer solution.\nTransfer, share, and manage your files with ease. Whether for personal or professional use, rTransfer provides you with a reliable and accessible platform.\nWhat you can do with rTransfer:\n- Transfer and organize your files\n- Share files securely\nrTransfer is designed to be simple, secure, and efficient — your data remains under your control."
tagline:
