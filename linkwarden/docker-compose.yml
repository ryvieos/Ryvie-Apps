version: "3.7"

services:
  postgres:
    container_name: app-linkwarden-postgres
    image: postgres:16-alpine
    environment:
      - POSTGRES_PASSWORD=linkwarden
    restart: unless-stopped 
    volumes:
      - ./data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    container_name: app-linkwarden-app
    image: ghcr.io/linkwarden/linkwarden:v2.14.0
    ports:
      - "3028:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:linkwarden@postgres:5432/postgres
      - NEXTAUTH_URL=http://ryvie.local:3028/api/v1/auth
      - NEXTAUTH_SECRET=linkwarden
      # IA centrale Ryvie — renseigné quand l'app est connectée (Réglages → IA).
      # Active l'auto-tagging par IA ; vides par défaut → fonction désactivée.
      - NEXT_PUBLIC_OPENAI=${NEXT_PUBLIC_OPENAI:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
    restart: unless-stopped
    volumes:
      - ./data/app:/data/data
    depends_on:
      postgres:
        condition: service_healthy
        