name: paperclip

services:
  db:
    container_name: app-paperclip-db
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data

  server:
    container_name: app-paperclip-server
    image: tuyenvd/paperclip:latest
    restart: unless-stopped
    # Tourne avec l'UID propriétaire de /data (utilisateur ryvie), aligné sur les
    # chown de ./data/paperclip et de .claude faits par install.sh. PUID/PGID écrits
    # dans .env par install.sh. Fallback 1000 → inchangé sur les appliances.
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      HOST: "0.0.0.0"
      SERVE_UI: "true"
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_URL_BASE}:3100"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      BETTER_AUTH_URL: "${PAPERCLIP_URL_BASE}:3100"
    volumes:
      - ./data/paperclip:/paperclip
      # Auth Claude Code : monte la session claude de l'hôte (uid 1000 = node).
      # Vue live : un /login sur l'hôte est visible immédiatement par l'agent, sans redémarrer.
      - /home/ryvie/.claude:/paperclip/.claude
      # Fiche de gestion des comptes Ryvie (stratégie container-exec). Montée en
      # lecture seule dans /app/server pour résoudre better-auth/pg via les
      # node_modules de l'app.
      - ./accounts/ryvie-accounts.mjs:/app/server/ryvie-accounts.mjs:ro
    depends_on:
      db:
        condition: service_healthy