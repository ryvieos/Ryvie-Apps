manifestVersion: 1
id: paperclip
category:
  fr: IA
  en: AI
name: Paperclip
version: "0.3.1"
buildId: 8
port: 3100
description:
  fr: "Paperclip est une plateforme d'orchestration d'agents IA qui permet de créer et gérer des équipes d'agents autonomes.\nDéfinissez des agents spécialisés, assignez-leur des tâches, et laissez-les collaborer pour accomplir des objectifs complexes. Paperclip supervise le travail, gère les communications et assure le suivi des résultats.\nCe que vous pouvez faire avec Paperclip :\n- Créer des équipes d'agents IA spécialisés\n- Assigner et suivre des tâches complexes\n- Automatiser des workflows avec des agents\n- Intégrer différents modèles d'IA (Claude, GPT, etc.)\n- Superviser et auditer le travail des agents\nPaperclip transforme l'IA en une véritable force de travail autonome, organisée et supervisée."
  en: "Paperclip is an AI agent orchestration platform that lets you create and manage teams of autonomous agents.\nDefine specialized agents, assign them tasks, and let them collaborate to achieve complex goals. Paperclip supervises the work, manages communications, and tracks results.\nWhat you can do with Paperclip:\n- Create teams of specialized AI agents\n- Assign and track complex tasks\n- Automate workflows with agents\n- Integrate different AI models (Claude, GPT, etc.)\n- Supervise and audit agent work\nPaperclip turns AI into a true autonomous, organized, and supervised workforce."
tagline:
  fr: "Orchestrez des équipes d'agents IA autonomes."
  en: "Orchestrate teams of autonomous AI agents."
gallery:
  - icon.png
  - image1.png
  - image2.png
  - image3.png
  - image4.png
accounts:
  # Paperclip s'authentifie via better-auth (hash scrypt, table `account`). La logique
  # de reset vit DANS l'app : la fiche ryvie-accounts.mjs (montée dans le conteneur via
  # le compose) réutilise le hasher natif de better-auth. Ryvie ne fait que la lancer.
  strategy: container-exec
  container: app-paperclip-server
  runtime: node
  script: /app/server/ryvie-accounts.mjs
  workingDir: /app/server
  reset:
    expect: "OK"
  # Compte par défaut créé par install.sh (better-auth sign-up). Détection via login.
  default:
    email: changeme@ryvie.fr
    username: changeme
    password: "Changeme1234!"
    provision: installScript
    login:
      path: /api/auth/sign-in/email
      body: '{"email":"{email}","password":"{password}"}'
      okCodes: [200]
